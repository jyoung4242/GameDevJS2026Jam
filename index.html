<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="./ex-logo.png" />
  <link rel="stylesheet" href="./src/style.css" />
  <title>GameDev.js Jam 2026</title>
</head>

<body>
  <style>
    canvas {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Parts placed on the grid */
    .placed-part {
      position: absolute;
      top: 0;
      left: 0;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 3px;
      font-size: 0.75rem;
      cursor: default;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The floating ghost while dragging */
    .drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.75;
      cursor: grabbing;
      background: #4a90e2;
      color: white;
      border: 2px dashed #fff;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      transition: none;
    }

  </style>

  <main>
    <canvas id="game"></canvas>

    <main-screen></main-screen>

    <a id="commit-ref" target="_top"
      href="https://github.com/jyoung4242/GameDevJS2026Jam/commit/commitRef">commitRefShort</a>
  </main>

  <script type="module" src="./src/main.ts"> </script>
</body>

</html>
